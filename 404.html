<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>404 — Page introuvable | Vegeceutic Labs</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f10;
            color: #f4f4f5;
            padding: 2rem;
            text-align: center;
        }
        .wrap { max-width: 32rem; }
        .code {
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #8ef6a4, #3ad37e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; font-weight: 600; }
        p { opacity: 0.75; margin-bottom: 2rem; }
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #3ad37e;
            color: #0f0f10;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: transform 0.15s ease;
        }
        a:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <h1>Cette page n'existe pas</h1>
        <p>La page que vous cherchez a peut-être été déplacée ou supprimée.</p>
        <a href="/">← Retour à l'accueil</a>
    </div>
</body>
</html>
